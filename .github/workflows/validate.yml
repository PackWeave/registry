name: Validate packs

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/generate.py"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate all packs
        run: python scripts/generate.py --validate-only
